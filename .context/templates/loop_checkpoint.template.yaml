# LoopCheckpoint template
# Copy to .context/checkpoints/<slug>.yaml and fill in required fields.
# Write a new checkpoint at the end of every orchestrator cycle.

checkpoint_id: ""           # (required) e.g. "chk-$(date +%Y%m%d-%H%M)-<loop-name>"
schema_version: "0.1"
created_at: ""              # (required) ISO 8601
updated_at: ""              # (required) ISO 8601
parent_checkpoint_id: ""    # id of previous checkpoint (empty if first)
active_capsule_ids: []      # (required) list all active capsule ids
orchestrator_cycle_id: ""   # (required) monotonic counter or slug

last_completed_cycle: ""
current_phase: "monitoring" # monitoring | investigating | remediating | sleeping
current_operational_state: ""

latest_worker_outputs: []
unresolved_blockers: []

next_scheduled_action: ""
next_wakeup_reason: ""

relaunch_metadata:
  relaunch_command: ""
  relaunch_args: []
  environment: {}

compaction_status: "not_required"

orchestrator:
  last_compacted_at: ""
  current_cycle_id: ""
  active_worker_ids: []
  active_capsule_ids: []
  next_allowed_action: ""
  context_risk:
    long_lived_session: false
    high_parallelism: false
    subagent_heavy: false
    checkpoint_stale: false
    reload_scope_too_large: false

operator_summary: ""
