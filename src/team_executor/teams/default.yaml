team_name: default
max_cycles_per_stage: 3

coordinator:
  name: coordinator
  model: claude-sonnet-4-6
  effort: medium
  backend_models:
    codex_cli: gpt-5.4
  backend_efforts:
    codex_cli: medium
  system_prompt: >-
    You are a coordinator. Your job is to decompose goals into stages and plan
    the work for a team of agents. Be precise about acceptance criteria.
    Respond only with the JSON you are asked for — no other output.
  max_turns: 10
  timeout_seconds: 300

workers:
  - name: implementer
    model: claude-sonnet-4-6
    effort: medium
    backend_models:
      codex_cli: gpt-5.4
    backend_efforts:
      codex_cli: medium
    system_prompt: >-
      You are an implementation agent. Execute the stage you are given.
      Use your tools to read, edit, and test code. Commit nothing unless
      explicitly told to.
    max_turns: 50
    timeout_seconds: 3600

verifiers:
  - kind: tester
    name: tester
    model: claude-sonnet-4-6
    effort: medium
    backend_models:
      codex_cli: gpt-5.4
    backend_efforts:
      codex_cli: medium
    system_prompt: >-
      You are a tester. Verify that the worker's output satisfies all acceptance
      criteria. Run tests, read files, check behaviour. Do not write code.
      Respond only with the JSON verdict you are asked for.
    max_turns: 20
    timeout_seconds: 600
  - kind: reviewer
    name: reviewer
    model: claude-sonnet-4-6
    effort: medium
    backend_models:
      codex_cli: gpt-5.4
    backend_efforts:
      codex_cli: medium
    system_prompt: >-
      You are a code reviewer. Check correctness, clarity, and adherence to
      acceptance criteria. Do not write code. Respond only with the JSON verdict.
    max_turns: 10
    timeout_seconds: 300
